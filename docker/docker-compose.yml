services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langafy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langafy_dev}
      POSTGRES_DB: ${POSTGRES_DB:-langafy}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langafy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/LangafyApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-langafy};
        Username=${POSTGRES_USER:-langafy};Password=${POSTGRES_PASSWORD:-langafy_dev}
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID:-your-firebase-project-id}
      OpenRouter__ApiKey: ${OPENROUTER_API_KEY:-your-openrouter-api-key}
      AllowedOrigin: ${ALLOWED_ORIGIN:-http://localhost:3000}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:5000/swagger/index.html || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-your-firebase-project-id}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
